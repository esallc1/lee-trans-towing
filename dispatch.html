<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehigh Towing — Dispatch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --border:   #2a2a2a;
    --amber:    #f5a623;
    --amber-dim:#b87a18;
    --green:    #22c55e;
    --red:      #ef4444;
    --text:     #f0f0f0;
    --muted:    #888;
    --radius:   6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--amber);
  }
  .logo span { color: var(--text); }
  .status-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    background: #1a2e1a;
    color: var(--green);
    border: 1px solid #2a4a2a;
  }

  /* ── LAYOUT ── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
  }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-body { padding: 16px; }

  /* ── FORM ── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  input, select, textarea {
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--amber);
  }
  select { cursor: pointer; }
  textarea { resize: vertical; min-height: 64px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── RATE CALCULATOR ── */
  .calc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .calc-row:last-of-type { border-bottom: none; }
  .calc-label { color: var(--muted); }
  .calc-value { font-weight: 600; color: var(--text); }
  .calc-total {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: #111;
    border-top: 1px solid var(--border);
    margin: 0 -16px -16px;
  }
  .calc-total-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .calc-total-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--amber);
  }

  /* ── BUTTONS ── */
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.98); }
  .btn-amber { background: var(--amber); color: #000; }
  .btn-amber:hover { opacity: 0.9; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 8px;
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  /* ── MAP ── */
  .map-frame {
    width: 100%;
    height: 220px;
    background: #111;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
    position: relative;
  }
  .map-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    top: 0; left: 0;
  }
  .map-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
  }
  .map-icon { font-size: 28px; opacity: 0.4; }

  /* ── JOB LOG ── */
  .full-width { grid-column: 1 / -1; }
  .log-empty {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .job-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .job-card:last-child { border-bottom: none; }
  .job-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--amber);
    min-width: 36px;
  }
  .job-info { min-width: 0; }
  .job-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .job-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
  }
  .badge-dispatched { background: #1a2e1a; color: var(--green); }
  .badge-pending    { background: #2a1f00; color: var(--amber); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 99px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  /* ── RATE INPUTS ── */
  .rate-config {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .rate-config .field { flex: 1; margin-bottom: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">Lehigh <span>Towing</span> Dispatch</div>
  <div class="status-pill">● Online</div>
</header>

<div class="main">

  <!-- LEFT: JOB FORM -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">New Job</div>
    </div>
    <div class="panel-body">
      <div class="row-2">
        <div class="field">
          <label>Customer Name</label>
          <input type="text" id="custName" placeholder="John Rivera" autocomplete="off">
        </div>
        <div class="field">
          <label>Customer Phone</label>
          <input type="tel" id="custPhone" placeholder="(239) 555-0000">
        </div>
      </div>

      <div class="field">
        <label>Pickup Address</label>
        <input type="text" id="pickupAddr" placeholder="1234 Lee Blvd, Lehigh Acres, FL" oninput="updateMap()">
      </div>

      <div class="map-frame" id="mapContainer">
        <div class="map-placeholder">
          <div class="map-icon">📍</div>
          <div>Enter address to see map</div>
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Service Type</label>
          <select id="serviceType">
            <option value="Standard Tow">Standard Tow</option>
            <option value="Flatbed Tow">Flatbed Tow</option>
            <option value="Jump Start">Jump Start</option>
            <option value="Lockout">Lockout</option>
            <option value="Tire Change">Tire Change</option>
            <option value="Fuel Delivery">Fuel Delivery</option>
            <option value="Winch Out">Winch Out</option>
          </select>
        </div>
        <div class="field">
          <label>Vehicle</label>
          <input type="text" id="vehicle" placeholder="2019 Toyota Camry">
        </div>
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="notes" placeholder="Silver sedan, broken down on I-75 southbound..."></textarea>
      </div>
    </div>
  </div>

  <!-- RIGHT: RATE + DISPATCH -->
  <div style="display:flex; flex-direction:column; gap:20px;">

    <div class="panel">
      <div class="panel-header">
        <div class="panel-label">Rate Calculator</div>
      </div>
      <div class="panel-body">
        <div class="rate-config">
          <div class="field">
            <label>Hookup Fee ($)</label>
            <input type="number" id="hookupFee" value="75" min="0" oninput="calcRate()">
          </div>
          <div class="field">
            <label>Per Mile ($)</label>
            <input type="number" id="perMile" value="4" min="0" oninput="calcRate()">
          </div>
          <div class="field">
            <label>Est. Miles</label>
            <input type="number" id="miles" value="0" min="0" oninput="calcRate()">
          </div>
        </div>

        <div class="calc-row">
          <span class="calc-label">Hookup fee</span>
          <span class="calc-value" id="displayHookup">$75.00</span>
        </div>
        <div class="calc-row">
          <span class="calc-label">Mileage (<span id="displayMiles">0</span> mi × $<span id="displayRate">4.00</span>)</span>
          <span class="calc-value" id="displayMileage">$0.00</span>
        </div>

        <div class="calc-total">
          <span class="calc-total-label">Quote</span>
          <span class="calc-total-value" id="displayTotal">$75</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-label">Dispatch</div>
      </div>
      <div class="panel-body">
        <div class="field">
          <label>Operator Phone</label>
          <input type="tel" id="operatorPhone" value="(239) 440-2122">
        </div>
        <a id="dispatchBtn" class="btn btn-amber" onclick="dispatch()">
          ⚡ Dispatch Now
        </a>
        <button class="btn btn-ghost" onclick="clearForm()">Clear Form</button>
      </div>
    </div>

  </div>

  <!-- FULL WIDTH: JOB LOG -->
  <div class="panel full-width">
    <div class="panel-header">
      <div class="panel-label">Job Log — Today</div>
    </div>
    <div id="jobLog">
      <div class="log-empty">No jobs dispatched yet. First call coming soon. 🚛</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let jobCount = 0;

  function calcRate() {
    const hookup = parseFloat(document.getElementById('hookupFee').value) || 0;
    const rate   = parseFloat(document.getElementById('perMile').value) || 0;
    const miles  = parseFloat(document.getElementById('miles').value) || 0;
    const mileage = rate * miles;
    const total  = hookup + mileage;

    document.getElementById('displayHookup').textContent  = '$' + hookup.toFixed(2);
    document.getElementById('displayMiles').textContent   = miles;
    document.getElementById('displayRate').textContent    = rate.toFixed(2);
    document.getElementById('displayMileage').textContent = '$' + mileage.toFixed(2);
    document.getElementById('displayTotal').textContent   = '$' + Math.round(total);
  }

  let mapTimer;
  function updateMap() {
    clearTimeout(mapTimer);
    mapTimer = setTimeout(() => {
      const addr = document.getElementById('pickupAddr').value.trim();
      const container = document.getElementById('mapContainer');
      if (!addr) {
        container.innerHTML = `<div class="map-placeholder"><div class="map-icon">📍</div><div>Enter address to see map</div></div>`;
        return;
      }
      const encoded = encodeURIComponent(addr);
      container.innerHTML = `<iframe src="https://maps.google.com/maps?q=${encoded}&output=embed&z=14" allowfullscreen loading="lazy"></iframe>`;
    }, 800);
  }

  function dispatch() {
    const name    = document.getElementById('custName').value.trim();
    const phone   = document.getElementById('custPhone').value.trim();
    const addr    = document.getElementById('pickupAddr').value.trim();
    const vehicle = document.getElementById('vehicle').value.trim();
    const service = document.getElementById('serviceType').value;
    const notes   = document.getElementById('notes').value.trim();
    const total   = document.getElementById('displayTotal').textContent;
    const operator= document.getElementById('operatorPhone').value.replace(/\D/g, '');

    if (!addr) { showToast('⚠️ Enter pickup address', '#ef4444'); return; }

    const mapsLink = `https://maps.google.com/?q=${encodeURIComponent(addr)}`;
    const smsBody =
      `🚛 NEW JOB — Lehigh Towing\n` +
      `Service: ${service}\n` +
      `Customer: ${name || 'N/A'} ${phone ? '· ' + phone : ''}\n` +
      `Vehicle: ${vehicle || 'N/A'}\n` +
      `Address: ${addr}\n` +
      `Quote: ${total}\n` +
      (notes ? `Notes: ${notes}\n` : '') +
      `Nav: ${mapsLink}`;

    const smsLink = `sms:+1${operator}?&body=${encodeURIComponent(smsBody)}`;
    window.location.href = smsLink;

    logJob({ name, phone, addr, vehicle, service, total });
    showToast('✓ Dispatched!');
  }

  function logJob({ name, phone, addr, vehicle, service, total }) {
    jobCount++;
    const log = document.getElementById('jobLog');
    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

    // Remove empty state
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'job-card';
    card.innerHTML = `
      <div class="job-num">#${String(jobCount).padStart(2,'0')}</div>
      <div class="job-info">
        <div class="job-name">${name || 'Unknown'} — ${service}</div>
        <div class="job-meta">${addr} · ${vehicle || 'No vehicle'} · ${time} · <strong style="color:var(--amber)">${total}</strong></div>
      </div>
      <div class="job-badge badge-dispatched">Sent</div>
    `;
    log.prepend(card);
  }

  function clearForm() {
    ['custName','custPhone','pickupAddr','vehicle','notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('miles').value = 0;
    document.getElementById('serviceType').selectedIndex = 0;
    document.getElementById('mapContainer').innerHTML =
      `<div class="map-placeholder"><div class="map-icon">📍</div><div>Enter address to see map</div></div>`;
    calcRate();
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || 'var(--green)';
    t.style.color = color ? '#fff' : '#000';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Init
  calcRate();
</script>
</body>
</html>
