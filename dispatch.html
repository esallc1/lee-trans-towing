<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehigh Towing — Dispatch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0d0d;
    --surface: #161616;
    --border:  #2a2a2a;
    --amber:   #f5a623;
    --green:   #22c55e;
    --red:     #ef4444;
    --text:    #f0f0f0;
    --muted:   #888;
    --radius:  6px;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; min-height: 100vh; }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 54px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 200;
  }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: .04em; text-transform: uppercase; color: var(--amber); }
  .logo span { color: var(--text); }
  .status-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; background: #1a2e1a; color: var(--green); border: 1px solid #2a4a2a; }

  .main { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:700px){ .main { grid-template-columns:1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .panel-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .panel-body { padding: 16px; }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

  /* autocomplete wrapper */
  .ac-wrap { position: relative; }
  .ac-wrap input { width: 100%; }
  .ac-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 500;
    background: #1e1e1e; border: 1px solid var(--amber); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius); max-height: 220px; overflow-y: auto;
    display: none;
  }
  .ac-dropdown.open { display: block; }
  .ac-item { padding: 10px 14px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 8px; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: #2a2a2a; }
  .ac-icon { color: var(--amber); flex-shrink: 0; margin-top: 2px; }
  .ac-main { font-weight: 600; color: var(--text); }
  .ac-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

  input, select, textarea {
    width: 100%; background: #111; border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 15px; padding: 9px 12px; outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--amber); }
  select { cursor: pointer; }
  textarea { resize: vertical; min-height: 64px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* map */
  #mapContainer { width: 100%; height: 240px; background: #111; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; position: relative; }
  .map-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:13px; }
  .map-icon { font-size:28px; opacity:.4; }

  /* rate calc */
  .rate-config { display: flex; gap: 10px; margin-bottom: 14px; }
  .rate-config .field { flex: 1; margin-bottom: 0; }
  .calc-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .calc-row:last-of-type { border-bottom: none; }
  .calc-label { color: var(--muted); }
  .calc-value { font-weight: 600; }
  .calc-total { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:#111; border-top:1px solid var(--border); margin:0 -16px -16px; }
  .calc-total-label { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .calc-total-value { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; color:var(--amber); }

  /* buttons */
  .btn { display:block; width:100%; padding:13px; border:none; border-radius:var(--radius); font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:opacity .15s,transform .1s; text-align:center; text-decoration:none; }
  .btn:active { transform:scale(.98); }
  .btn-amber { background:var(--amber); color:#000; }
  .btn-amber:hover { opacity:.9; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); margin-top:8px; }
  .btn-ghost:hover { border-color:var(--text); color:var(--text); }

  /* job log */
  .full-width { grid-column:1/-1; }
  .log-empty { padding:32px; text-align:center; color:var(--muted); font-size:13px; }
  .job-card { padding:14px 16px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; }
  .job-card:last-child { border-bottom:none; }
  .job-num { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; color:var(--amber); min-width:36px; }
  .job-info { min-width:0; }
  .job-name { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-meta { font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-badge { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:99px; }
  .badge-dispatched { background:#1a2e1a; color:var(--green); }

  /* toast */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:#000; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:12px 24px; border-radius:99px; transition:transform .3s ease; z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .miles-row { display:flex; gap:10px; }
  .miles-row .field { flex:1; margin-bottom:0; }
  .miles-tag { font-size:10px; color:var(--amber); font-weight:400; text-transform:none; letter-spacing:0; }
</style>
</head>
<body>

<header>
  <div class="logo">Lehigh <span>Towing</span> Dispatch</div>
  <div class="status-pill">● Online</div>
</header>

<div class="main">

  <!-- LEFT: JOB FORM -->
  <div class="panel">
    <div class="panel-header"><div class="panel-label">New Job</div></div>
    <div class="panel-body">

      <div class="row-2">
        <div class="field">
          <label>Customer Name</label>
          <input type="text" id="custName" placeholder="John Rivera" autocomplete="off">
        </div>
        <div class="field">
          <label>Customer Phone</label>
          <input type="tel" id="custPhone" placeholder="(239) 555-0000">
        </div>
      </div>

      <div class="field">
        <label>Pickup Address</label>
        <div class="ac-wrap">
          <input type="text" id="pickupAddr" placeholder="252 Mongoose Ln N, Fort Myers" autocomplete="off">
          <div class="ac-dropdown" id="pickupDropdown"></div>
        </div>
      </div>

      <div class="field">
        <label>Drop-off Address</label>
        <div class="ac-wrap">
          <input type="text" id="dropoffAddr" placeholder="500 Joel Blvd, Lehigh Acres" autocomplete="off">
          <div class="ac-dropdown" id="dropoffDropdown"></div>
        </div>
      </div>

      <div id="mapContainer">
        <div class="map-placeholder">
          <div class="map-icon">📍</div>
          <div>Enter addresses to see route</div>
        </div>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Service Type</label>
          <select id="serviceType">
            <option>Standard Tow</option>
            <option>Flatbed Tow</option>
            <option>Jump Start</option>
            <option>Lockout</option>
            <option>Tire Change</option>
            <option>Fuel Delivery</option>
            <option>Winch Out</option>
          </select>
        </div>
        <div class="field">
          <label>Vehicle</label>
          <input type="text" id="vehicle" placeholder="2019 Toyota Camry">
        </div>
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="notes" placeholder="Silver sedan, broken down on I-75 southbound..."></textarea>
      </div>

    </div>
  </div>

  <!-- RIGHT: RATE + DISPATCH -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="panel">
      <div class="panel-header"><div class="panel-label">Rate Calculator</div></div>
      <div class="panel-body">
        <div class="rate-config">
          <div class="field">
            <label>Hookup ($)</label>
            <input type="number" id="hookupFee" value="75" min="0" oninput="calcRate()">
          </div>
          <div class="field">
            <label>Per Mile ($)</label>
            <input type="number" id="perMile" value="4" min="0" oninput="calcRate()">
          </div>
          <div class="field">
            <label>Miles <span class="miles-tag" id="milesTag">(auto)</span></label>
            <input type="number" id="miles" value="0" min="0" oninput="calcRate(); document.getElementById('milesTag').textContent='(manual)'">
          </div>
        </div>

        <div class="calc-row">
          <span class="calc-label">Hookup fee</span>
          <span class="calc-value" id="displayHookup">$75.00</span>
        </div>
        <div class="calc-row">
          <span class="calc-label">Mileage (<span id="displayMiles">0</span> mi × $<span id="displayRate">4.00</span>)</span>
          <span class="calc-value" id="displayMileage">$0.00</span>
        </div>

        <div class="calc-total">
          <span class="calc-total-label">Quote</span>
          <span class="calc-total-value" id="displayTotal">$75</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="panel-label">Dispatch</div></div>
      <div class="panel-body">
        <div class="field">
          <label>Operator Phone</label>
          <input type="tel" id="operatorPhone" value="(239) 440-2122">
        </div>
        <a class="btn btn-amber" onclick="dispatch()">⚡ Dispatch Now</a>
        <button class="btn btn-ghost" onclick="clearForm()">Clear Form</button>
      </div>
    </div>

  </div>

  <!-- JOB LOG -->
  <div class="panel full-width">
    <div class="panel-header"><div class="panel-label">Job Log — Today</div></div>
    <div id="jobLog">
      <div class="log-empty">No jobs dispatched yet. First call coming soon. 🚛</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Google Maps JS API with Places -->
<script>
  const GM_KEY = 'AIzaSyD1BK6DUg7rYYp8asmcykoi6lMkTseEf0s';
</script>
<script>
  let map, directionsService, directionsRenderer, autocompleteService, placesService;
  let pickupPlace = null, dropoffPlace = null;
  let jobCount = 0;

  function setupMap() {
    map = new google.maps.Map(document.getElementById('mapContainer'), {
      center: { lat: 26.611, lng: -81.636 }, // Lehigh Acres
      zoom: 11,
      styles: [
        { elementType: 'geometry', stylers: [{ color: '#242424' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#aaa' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#1a1a1a' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#3d3d3d' }] },
        { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#484848' }] },
        { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#5a5a5a' }] },
        { featureType: 'road.highway', elementType: 'geometry.stroke', stylers: [{ color: '#333' }] },
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#17283a' }] },
        { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#4a6fa5' }] },
        { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#2a2a2a' }] },
        { featureType: 'poi', stylers: [{ visibility: 'off' }] },
        { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      ],
      disableDefaultUI: false,
      zoomControl: true,
      streetViewControl: false,
      mapTypeControl: false,
      fullscreenControl: false,
    });

    directionsService  = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map,
      polylineOptions: { strokeColor: '#f5a623', strokeWeight: 4 },
      suppressMarkers: false,
    });
    autocompleteService = new google.maps.places.AutocompleteService();
    placesService = new google.maps.places.PlacesService(map);
  }

  // ── AUTOCOMPLETE ──
  function setupAutocomplete(inputId, dropdownId, onSelect) {
    const input    = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let timer;

    input.addEventListener('input', () => {
      clearTimeout(timer);
      const val = input.value.trim();
      if (val.length < 3) { dropdown.classList.remove('open'); return; }
      timer = setTimeout(() => {
        autocompleteService.getPlacePredictions(
          { input: val, componentRestrictions: { country: 'us' }, location: new google.maps.LatLng(26.611, -81.636), radius: 80000 },
          (preds, status) => {
            dropdown.innerHTML = '';
            if (status !== google.maps.places.PlacesServiceStatus.OK || !preds) {
              dropdown.classList.remove('open'); return;
            }
            preds.slice(0, 5).forEach(p => {
              const item = document.createElement('div');
              item.className = 'ac-item';
              const main = p.structured_formatting.main_text;
              const sub  = p.structured_formatting.secondary_text || '';
              item.innerHTML = `<div class="ac-icon">📍</div><div><div class="ac-main">${main}</div><div class="ac-sub">${sub}</div></div>`;
              item.addEventListener('mousedown', (e) => {
                e.preventDefault();
                input.value = p.description;
                dropdown.classList.remove('open');
                // Get place details for lat/lng
                placesService.getDetails({ placeId: p.place_id, fields: ['geometry', 'formatted_address'] }, (place, s) => {
                  if (s === google.maps.places.PlacesServiceStatus.OK) {
                    onSelect(place);
                    tryRoute();
                  }
                });
              });
              dropdown.appendChild(item);
            });
            dropdown.classList.add('open');
          }
        );
      }, 300);
    });

    input.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('open'), 150));
  }

  function tryRoute() {
    if (!pickupPlace || !dropoffPlace) {
      // Just show pickup pin if only pickup selected
      if (pickupPlace) {
        map.setCenter(pickupPlace.geometry.location);
        map.setZoom(13);
      }
      return;
    }

    directionsService.route({
      origin: pickupPlace.geometry.location,
      destination: dropoffPlace.geometry.location,
      travelMode: google.maps.TravelMode.DRIVING,
    }, (result, status) => {
      if (status === 'OK') {
        directionsRenderer.setDirections(result);
        const leg = result.routes[0].legs[0];
        const meters = leg.distance.value;
        const miles  = (meters / 1609.34).toFixed(1);
        document.getElementById('miles').value = miles;
        document.getElementById('milesTag').textContent = '(calculated)';
        calcRate();
      }
    });
  }

  // ── RATE CALC ──
  function calcRate() {
    const hookup  = parseFloat(document.getElementById('hookupFee').value) || 0;
    const rate    = parseFloat(document.getElementById('perMile').value)   || 0;
    const miles   = parseFloat(document.getElementById('miles').value)     || 0;
    const mileage = rate * miles;
    const total   = hookup + mileage;
    document.getElementById('displayHookup').textContent  = '$' + hookup.toFixed(2);
    document.getElementById('displayMiles').textContent   = miles;
    document.getElementById('displayRate').textContent    = rate.toFixed(2);
    document.getElementById('displayMileage').textContent = '$' + mileage.toFixed(2);
    document.getElementById('displayTotal').textContent   = '$' + Math.round(total);
  }

  // ── DISPATCH ──
  function dispatch() {
    const name     = document.getElementById('custName').value.trim();
    const phone    = document.getElementById('custPhone').value.trim();
    const pickup   = document.getElementById('pickupAddr').value.trim();
    const dropoff  = document.getElementById('dropoffAddr').value.trim();
    const vehicle  = document.getElementById('vehicle').value.trim();
    const service  = document.getElementById('serviceType').value;
    const notes    = document.getElementById('notes').value.trim();
    const total    = document.getElementById('displayTotal').textContent;
    const operator = document.getElementById('operatorPhone').value.replace(/\D/g,'');

    if (!pickup) { showToast('⚠️ Enter pickup address', '#ef4444'); return; }

    const mapsLink = dropoff
      ? `https://maps.google.com/maps?saddr=${encodeURIComponent(pickup)}&daddr=${encodeURIComponent(dropoff)}`
      : `https://maps.google.com/?q=${encodeURIComponent(pickup)}`;

    const smsBody =
      `🚛 NEW JOB — Lehigh Towing\n` +
      `Service: ${service}\n` +
      `Customer: ${name||'N/A'} ${phone?'· '+phone:''}\n` +
      `Vehicle: ${vehicle||'N/A'}\n` +
      `Pickup: ${pickup}\n` +
      (dropoff ? `Drop-off: ${dropoff}\n` : '') +
      `Quote: ${total}\n` +
      (notes ? `Notes: ${notes}\n` : '') +
      `Nav: ${mapsLink}`;

    window.location.href = `sms:+1${operator}?&body=${encodeURIComponent(smsBody)}`;
    logJob({ name, phone, pickup, dropoff, vehicle, service, total });
    showToast('✓ Dispatched!');
  }

  function logJob({ name, phone, pickup, dropoff, vehicle, service, total }) {
    jobCount++;
    const log  = document.getElementById('jobLog');
    const time = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    const empty = log.querySelector('.log-empty');
    if (empty) empty.remove();
    const card = document.createElement('div');
    card.className = 'job-card';
    card.innerHTML = `
      <div class="job-num">#${String(jobCount).padStart(2,'0')}</div>
      <div class="job-info">
        <div class="job-name">${name||'Unknown'} — ${service}</div>
        <div class="job-meta">${pickup}${dropoff?' → '+dropoff:''} · ${vehicle||'No vehicle'} · ${time} · <strong style="color:var(--amber)">${total}</strong></div>
      </div>
      <div class="job-badge badge-dispatched">Sent</div>`;
    log.prepend(card);
  }

  function clearForm() {
    ['custName','custPhone','pickupAddr','dropoffAddr','vehicle','notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('miles').value = 0;
    document.getElementById('serviceType').selectedIndex = 0;
    document.getElementById('milesTag').textContent = '(auto)';
    pickupPlace = null; dropoffPlace = null;
    if (directionsRenderer) { directionsRenderer.setMap(null); directionsRenderer.setMap(map); }
    if (map) { map.setCenter({ lat: 26.611, lng: -81.636 }); map.setZoom(11); }
    calcRate();
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || 'var(--green)';
    t.style.color = color ? '#fff' : '#000';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  window.initMap = function() {
    setupMap();
    setupAutocomplete('pickupAddr',  'pickupDropdown',  (place) => { pickupPlace  = place; });
    setupAutocomplete('dropoffAddr', 'dropoffDropdown', (place) => { dropoffPlace = place; });
  };

  calcRate();
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1BK6DUg7rYYp8asmcykoi6lMkTseEf0s&libraries=places&callback=initMap">
</script>

</body>
</html>
