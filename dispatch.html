<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehigh Towing — Dispatch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2e2e2e;
    --amber:    #f59e0b;
    --amber-dk: #d97706;
    --text:     #f1f1f1;
    --muted:    #888;
    --danger:   #ef4444;
    --green:    #22c55e;
    --blue:     #4285F4;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: var(--bg);
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2.5rem 2rem; width: 320px; text-align: center;
  }
  .login-card h1 { font-size: 1.4rem; color: var(--amber); margin-bottom: 0.25rem; }
  .login-card p  { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%; padding: 0.75rem 1rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 1rem; text-align: center;
    letter-spacing: 0.2em; margin-bottom: 1rem;
  }
  .login-card input:focus { outline: none; border-color: var(--amber); }
  .btn-login {
    width: 100%; padding: 0.75rem; background: var(--amber); color: #000;
    font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer;
  }
  .btn-login:hover { background: var(--amber-dk); }
  #login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* APP — column layout: top row (map+sidebar) + bottom job strip */
  #app { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

  .top-row { display: flex; flex: 1; min-height: 0; }

  /* MAP */
  #map-wrap { position: relative; flex: 1; }
  #map { width: 100%; height: 100%; }

  /* PIN BUTTONS on map */
  .pin-controls {
    position: absolute; top: 10px; left: 10px; z-index: 5;
    display: flex; flex-direction: column; gap: 6px;
  }
  .pin-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border: none; border-radius: 6px;
    font-size: 0.78rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); transition: opacity .15s;
    white-space: nowrap;
  }
  .pin-btn:hover { opacity: .88; }
  .pin-btn.pickup-pin  { background: #fff; color: #c00; }
  .pin-btn.dropoff-pin { background: #fff; color: var(--blue); }
  .pin-btn.active      { outline: 3px solid var(--amber); }
  #pin-hint {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff; padding: 6px 14px;
    border-radius: 20px; font-size: 0.82rem; pointer-events: none;
    display: none; z-index: 5; white-space: nowrap;
  }

  /* SIDEBAR */
  .sidebar {
    width: 28%; min-width: 300px; max-width: 400px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .sidebar-header h2 { font-size: 1rem; color: var(--amber); font-weight: 700; }
  .badge {
    font-size: 0.7rem; background: var(--amber); color: #000;
    padding: 2px 8px; border-radius: 99px; font-weight: 700;
  }

  .section { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 0.75rem;
  }

  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }

  input[type=text], input[type=tel], input[type=number], textarea {
    width: 100%; padding: 0.6rem 0.75rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 0.9rem; margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { outline: none; border-color: var(--amber); }
  textarea { resize: vertical; min-height: 60px; }

  .route-info { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .route-chip {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.82rem;
  }
  .route-chip span { display: block; font-size: 0.68rem; color: var(--muted); margin-bottom: 2px; }
  #route-distance, #route-duration { color: var(--amber); font-weight: 600; }

  .rate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 0.75rem; }

  .quote-box {
    margin-top: 0.75rem; background: var(--bg); border: 2px solid var(--amber);
    border-radius: 8px; padding: 0.75rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .quote-box label { margin: 0; font-size: 0.8rem; color: var(--muted); }
  .quote-amount {
    font-size: 1.6rem; font-weight: 700; color: var(--amber);
    background: transparent; border: none; width: 130px;
    text-align: right; -moz-appearance: textfield; margin-bottom: 0;
  }
  .quote-amount:focus { outline: none; }
  .quote-amount::-webkit-inner-spin-button { display: none; }

  .btn {
    width: 100%; padding: 0.75rem; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn:hover { opacity: 0.88; }
  .btn-amber { background: var(--amber); color: #000; }
  .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-green  { background: var(--green); color: #000; }
  .btn-sm     { padding: 0.35rem 0.75rem; font-size: 0.75rem; width: auto; border-radius: 5px; }

  .btn-row { display: flex; gap: 0.5rem; }
  .btn-row .btn { flex: 1; }

  #sms-status {
    font-size: 0.8rem; margin-top: 0.5rem; text-align: center;
    min-height: 1.2em; color: var(--green);
  }

  /* JOB LOG STRIP */
  #job-strip-wrap {
    position: relative; flex-shrink: 0; background: var(--bg);
    border-top: 2px solid var(--amber);
  }
  #job-strip {
    height: 188px; overflow-x: auto; overflow-y: hidden;
    display: flex; align-items: stretch; scroll-behavior: smooth;
  }
  #job-strip::-webkit-scrollbar { height: 4px; }
  #job-strip::-webkit-scrollbar-track { background: var(--bg); }
  #job-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  #job-strip-inner {
    display: flex; align-items: stretch; gap: 0; padding: 0;
    min-width: 100%;
  }
  .strip-arrow {
    position: absolute; top: 0; bottom: 0; width: 32px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(to right, rgba(15,15,15,0.95), transparent);
    border: none; color: var(--text); font-size: 1.1rem; cursor: pointer;
    z-index: 4; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .strip-arrow.right {
    right: 0; left: auto;
    background: linear-gradient(to left, rgba(15,15,15,0.95), transparent);
  }
  .strip-arrow.visible { opacity: 1; pointer-events: auto; }
  .strip-empty {
    display: flex; align-items: center; justify-content: center;
    width: 100%; color: var(--muted); font-size: 0.85rem; font-style: italic;
  }
  .job-card {
    flex: 0 0 280px; background: var(--surface); border-right: 1px solid var(--border);
    padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 3px;
    font-size: 0.78rem; position: relative; overflow: hidden;
  }
  .job-card:hover { background: #222; }
  .job-card-num {
    font-size: 0.65rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .job-card-name { font-weight: 700; font-size: 0.88rem; color: var(--text); }
  .job-card-phone { color: var(--muted); }
  .job-card-addr { color: var(--muted); line-height: 1.4; }
  .job-card-addr strong { color: var(--text); font-weight: 600; }
  .job-card-vehicle { color: var(--muted); font-style: italic; }
  .job-card-quote { color: var(--amber); font-weight: 700; font-size: 1rem; margin-top: auto; }
  .job-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border);
  }
  .job-card-time { color: var(--muted); font-size: 0.7rem; }
  .btn-edit {
    padding: 3px 10px; font-size: 0.72rem; font-weight: 700;
    background: var(--border); color: var(--text); border: none;
    border-radius: 4px; cursor: pointer;
  }
  .btn-edit:hover { background: var(--amber); color: #000; }

  /* Google autocomplete dark theme */
  .pac-container {
    background: #1a1a1a !important; border: 1px solid #f59e0b !important;
    border-radius: 8px !important; margin-top: 2px !important;
  }
  .pac-item { color: #f1f1f1 !important; padding: 8px 12px !important; cursor: pointer; }
  .pac-item:hover { background: #2e2e2e !important; }
  .pac-item-query { color: #f59e0b !important; }
  .pac-matched { color: #f59e0b !important; }

  /* map crosshair mode */
  #map.pin-mode { cursor: crosshair !important; }

  /* MAP TYPE TOGGLE */
  .map-type-toggle {
    position: absolute; top: 10px; right: 10px; z-index: 5;
    display: flex; border-radius: 6px; overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  .map-type-btn {
    padding: 6px 12px; border: none; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; background: rgba(20,20,20,0.85); color: #ccc;
    border-right: 1px solid #444; transition: background 0.15s, color 0.15s;
  }
  .map-type-btn:last-child { border-right: none; }
  .map-type-btn.active { background: var(--amber); color: #000; }

  /* OPERATOR STATUS STRIP */
  #operator-strip {
    padding: 5px 1.25rem; background: var(--surface);
    border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
    font-size: 0.78rem; font-weight: 600; flex-shrink: 0;
    display: flex; align-items: center; gap: 0.5rem;
  }
  #operator-dot { font-size: 0.7rem; }

  /* JOB STATUS BADGE */
  .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 99px;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-waiting  { background: #854d0e; color: #fef08a; }
  .status-assigned { background: #1e3a8a; color: #bfdbfe; }
  .status-enroute  { background: #7c2d12; color: #fed7aa; }
  .status-complete { background: #14532d; color: #bbf7d0; }

  .job-type-tag {
    font-size: 0.65rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .btn-advance {
    padding: 3px 10px; font-size: 0.7rem; font-weight: 700;
    background: #333; color: var(--text); border: none;
    border-radius: 4px; cursor: pointer;
  }
  .btn-advance:hover { background: var(--amber); color: #000; }
  .btn-advance:disabled { opacity: 0.35; cursor: default; }

  .job-card-eta { font-size: 0.72rem; color: #94a3b8; margin-top: 1px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>🚛 Dispatch</h1>
    <p>Lehigh Towing Service</p>
    <input type="password" id="pwd-input" placeholder="Enter access code" autocomplete="off">
    <button class="btn-login" onclick="checkLogin()">Unlock</button>
    <div id="login-error">Incorrect code. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="top-row">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="sidebar-header">
        <h2>🚛 Lehigh Towing Dispatch</h2>
        <span class="badge" id="job-count">0 jobs</span>
      </div>

      <!-- CUSTOMER -->
      <div class="section">
        <div class="section-title">Customer</div>
        <label>Job Type</label>
        <select id="job-type" style="width:100%;padding:0.6rem 0.75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.9rem;margin-bottom:0.75rem;">
          <option value="Tow">🚛 Tow</option>
          <option value="Flatbed">🛻 Flatbed</option>
          <option value="Lockout">🔑 Lockout</option>
          <option value="Jumpstart">⚡ Jumpstart</option>
          <option value="Roadside / Fuel">⛽ Roadside / Fuel</option>
        </select>
        <label>Name</label>
        <input type="text" id="cust-name" placeholder="Full name">
        <label>Phone</label>
        <input type="tel" id="cust-phone" placeholder="(239) 000-0000">
        <label>Vehicle</label>
        <input type="text" id="cust-vehicle" placeholder="2020 Honda Civic — Silver">
      </div>

      <!-- ROUTE -->
      <div class="section">
        <div class="section-title">Route</div>
        <label>Pickup Address</label>
        <input type="text" id="pickup" placeholder="Type or drop pin on map…">
        <label>Drop-off Address</label>
        <input type="text" id="dropoff" placeholder="Type or drop pin on map…">
        <div class="route-info">
          <div class="route-chip"><span>Distance</span><div id="route-distance">—</div></div>
          <div class="route-chip"><span>Est. Drive</span><div id="route-duration">—</div></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-amber" onclick="calcRoute()">📍 Map Route</button>
          <button class="btn btn-ghost"  onclick="clearRoute()">Clear</button>
        </div>
      </div>

      <!-- RATES -->
      <div class="section">
        <div class="section-title">Rate Calculator</div>
        <div class="rate-grid">
          <div>
            <label>Base Rate ($)</label>
            <input type="number" id="rate-base" value="75" min="0" oninput="calcQuote()">
          </div>
          <div>
            <label>Per Mile ($)</label>
            <input type="number" id="rate-mile" value="4.50" step="0.25" min="0" oninput="calcQuote()">
          </div>
          <div>
            <label>Hook Fee ($)</label>
            <input type="number" id="rate-hook" value="0" min="0" oninput="calcQuote()">
          </div>
          <div>
            <label>Extra ($)</label>
            <input type="number" id="rate-extra" value="0" min="0" oninput="calcQuote()">
          </div>
        </div>
        <div class="quote-box">
          <label>Total Quote</label>
          <span style="color:var(--amber);font-size:1.1rem;margin-bottom:0;">$</span>
          <input type="number" class="quote-amount" id="quote-total" value="75.00" step="0.01" min="0">
        </div>
      </div>

      <!-- NOTES -->
      <div class="section">
        <div class="section-title">Notes</div>
        <textarea id="job-notes" placeholder="Special instructions, location details…"></textarea>
      </div>

      <!-- ACTIONS -->
      <div class="section">
        <div class="section-title">Actions</div>
        <button class="btn btn-green" style="margin-bottom:0.5rem;" onclick="sendSMS()">
          📱 Send SMS Confirmation
        </button>
        <div id="sms-status"></div>
        <div class="btn-row" style="margin-top:0.5rem;">
          <button class="btn btn-amber" onclick="logJob()">✅ Log Job</button>
          <button class="btn btn-ghost"  onclick="resetForm()">New Job</button>
        </div>
      </div>

    </div><!-- /sidebar -->

    <!-- MAP -->
    <div id="map-wrap">
      <div id="map"></div>
      <div class="pin-controls">
        <button class="pin-btn pickup-pin" id="btn-pin-pickup" onclick="activatePin('pickup')">
          📍 Drop Pickup Pin
        </button>
        <button class="pin-btn dropoff-pin" id="btn-pin-dropoff" onclick="activatePin('dropoff')">
          📍 Drop Drop-off Pin
        </button>
      </div>
      <div id="pin-hint"></div>
      <div class="map-type-toggle">
        <button class="map-type-btn" onclick="setMapType('roadmap')">Street</button>
        <button class="map-type-btn" onclick="setMapType('satellite')">Satellite</button>
        <button class="map-type-btn active" onclick="setMapType('hybrid')">Hybrid</button>
      </div>
    </div>

  </div><!-- /top-row -->

  <!-- OPERATOR STATUS -->
  <div id="operator-strip">
    <span id="operator-dot">🟢</span>
    <span id="operator-label">Operator: Available</span>
  </div>

  <!-- JOB LOG STRIP -->
  <div id="job-strip-wrap">
    <button class="strip-arrow left"  id="strip-left"  onclick="stripScroll(-1)">&#8592;</button>
    <button class="strip-arrow right" id="strip-right" onclick="stripScroll(1)">&#8594;</button>
    <div id="job-strip">
      <div id="job-strip-inner">
        <div class="strip-empty">No jobs logged yet — dispatched jobs will appear here.</div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
  /* AUTH */
  function checkLogin() {
    if (document.getElementById('pwd-input').value.trim() === 'lehigh2026') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initMap();
      initPhoneFormat();
      initStripScroll();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
    }
  }
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkLogin();
  });

  /* PHONE FORMAT — (xxx) xxx-xxxx */
  function formatPhone(e) {
    const input = e.target;
    let digits = input.value.replace(/\D/g, '').slice(0, 10);
    let fmt = '';
    if (digits.length > 0) fmt  = '(' + digits.slice(0, 3);
    if (digits.length >= 4) fmt += ') ' + digits.slice(3, 6);
    if (digits.length >= 7) fmt += '-' + digits.slice(6, 10);
    input.value = fmt;
  }
  function initPhoneFormat() {
    document.getElementById('cust-phone').addEventListener('input', formatPhone);
  }

  /* STRIP SCROLL ARROWS */
  function initStripScroll() {
    const strip = document.getElementById('job-strip');
    strip.addEventListener('scroll', updateArrows);
    updateArrows();
  }
  function updateArrows() {
    const strip = document.getElementById('job-strip');
    const left  = document.getElementById('strip-left');
    const right = document.getElementById('strip-right');
    left.classList.toggle('visible',  strip.scrollLeft > 10);
    right.classList.toggle('visible', strip.scrollLeft < strip.scrollWidth - strip.clientWidth - 10);
  }
  function stripScroll(dir) {
    document.getElementById('job-strip').scrollBy({ left: dir * 300, behavior: 'smooth' });
    setTimeout(updateArrows, 320);
  }

  /* MAP */
  let map, directionsService, directionsRenderer, geocoder;
  let distanceMiles = 0;
  let etaMinutes = 0;
  let pinMode = null; // 'pickup' | 'dropoff' | null
  let pinMarkers = { pickup: null, dropoff: null };
  let pinClickListener = null;

  function setMapType(type) {
    const types = { roadmap: google.maps.MapTypeId.ROADMAP, satellite: google.maps.MapTypeId.SATELLITE, hybrid: google.maps.MapTypeId.HYBRID };
    map.setMapTypeId(types[type]);
    document.querySelectorAll('.map-type-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 26.6118, lng: -81.6323 },
      zoom: 12,
      mapTypeId: google.maps.MapTypeId.HYBRID,
    });

    geocoder = new google.maps.Geocoder();
    directionsService  = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      map,
      polylineOptions: { strokeColor: '#4285F4', strokeWeight: 5 }
    });

    const opts = { componentRestrictions: { country: 'us' } };
    const pu  = new google.maps.places.Autocomplete(document.getElementById('pickup'),  opts);
    const do_ = new google.maps.places.Autocomplete(document.getElementById('dropoff'), opts);
    pu.addListener('place_changed',  calcRoute);
    do_.addListener('place_changed', calcRoute);
  }

  /* DROP PIN */
  function activatePin(type) {
    if (pinMode === type) { deactivatePin(); return; }
    pinMode = type;
    const mapEl = document.getElementById('map');
    const hint  = document.getElementById('pin-hint');
    mapEl.classList.add('pin-mode');
    hint.style.display = 'block';
    hint.textContent = type === 'pickup'
      ? '🔴 Click map to set PICKUP location'
      : '🔵 Click map to set DROP-OFF location';
    document.getElementById('btn-pin-pickup').classList.toggle('active',  type === 'pickup');
    document.getElementById('btn-pin-dropoff').classList.toggle('active', type === 'dropoff');

    if (pinClickListener) google.maps.event.removeListener(pinClickListener);
    pinClickListener = map.addListener('click', e => {
      const latLng = e.latLng;
      placePin(type, latLng);
      deactivatePin();
    });
  }

  function deactivatePin() {
    pinMode = null;
    document.getElementById('map').classList.remove('pin-mode');
    document.getElementById('pin-hint').style.display = 'none';
    document.getElementById('btn-pin-pickup').classList.remove('active');
    document.getElementById('btn-pin-dropoff').classList.remove('active');
    if (pinClickListener) { google.maps.event.removeListener(pinClickListener); pinClickListener = null; }
  }

  function placePin(type, latLng) {
    if (pinMarkers[type]) pinMarkers[type].setMap(null);

    pinMarkers[type] = new google.maps.Marker({
      position: latLng,
      map,
      draggable: true,
      title: type === 'pickup' ? 'Pickup (drag to adjust)' : 'Drop-off (drag to adjust)',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor:   type === 'pickup' ? '#ef4444' : '#4285F4',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2,
      }
    });

    pinMarkers[type].addListener('dragend', e => {
      reverseGeocode(type, e.latLng);
    });

    reverseGeocode(type, latLng);
  }

  function reverseGeocode(type, latLng) {
    geocoder.geocode({ location: latLng }, (results, status) => {
      if (status === 'OK' && results[0]) {
        document.getElementById(type).value = results[0].formatted_address;
        calcRoute();
      }
    });
  }

  /* ROUTE */
  function calcRoute() {
    const p = document.getElementById('pickup').value.trim();
    const d = document.getElementById('dropoff').value.trim();
    if (!p || !d) return;
    directionsService.route(
      { origin: p, destination: d, travelMode: google.maps.TravelMode.DRIVING },
      (result, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(result);
          const leg = result.routes[0].legs[0];
          distanceMiles = leg.distance.value / 1609.34;
          etaMinutes = Math.round((distanceMiles / 45) * 60);
          document.getElementById('route-distance').textContent = distanceMiles.toFixed(1) + ' mi';
          document.getElementById('route-duration').textContent = leg.duration.text + ` (~${etaMinutes} min ETA)`;
          calcQuote();
        } else {
          document.getElementById('route-distance').textContent = 'Error';
        }
      }
    );
  }

  function clearRoute() {
    try { directionsRenderer.setDirections({ routes: [] }); } catch(e) {}
    ['pickup','dropoff'].forEach(t => {
      document.getElementById(t).value = '';
      if (pinMarkers[t]) { pinMarkers[t].setMap(null); pinMarkers[t] = null; }
    });
    document.getElementById('route-distance').textContent = '—';
    document.getElementById('route-duration').textContent = '—';
    distanceMiles = 0;
    etaMinutes = 0;
    calcQuote();
  }

  /* RATES */
  function calcQuote() {
    const base  = parseFloat(document.getElementById('rate-base').value)  || 0;
    const mile  = parseFloat(document.getElementById('rate-mile').value)  || 0;
    const hook  = parseFloat(document.getElementById('rate-hook').value)  || 0;
    const extra = parseFloat(document.getElementById('rate-extra').value) || 0;
    document.getElementById('quote-total').value = (base + mile * distanceMiles + hook + extra).toFixed(2);
  }

  /* OPERATOR STATUS */
  function setOperatorBusy() {
    document.getElementById('operator-dot').textContent   = '🔴';
    document.getElementById('operator-label').textContent = 'Operator: Busy';
  }
  function setOperatorAvailable() {
    document.getElementById('operator-dot').textContent   = '🟢';
    document.getElementById('operator-label').textContent = 'Operator: Available';
  }

  /* SMS */
  function sendSMS() {
    const phone   = document.getElementById('cust-phone').value.trim();
    const name    = document.getElementById('cust-name').value.trim() || 'Customer';
    const pickup  = document.getElementById('pickup').value.trim()    || '(pickup)';
    const dropoff = document.getElementById('dropoff').value.trim()   || '(drop-off)';
    const quote   = document.getElementById('quote-total').value;
    const jobType = document.getElementById('job-type').value;
    const miles   = distanceMiles > 0 ? distanceMiles.toFixed(1) : '?';
    const eta     = etaMinutes   > 0 ? etaMinutes : '?';
    const navLink = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(pickup)}&destination=${encodeURIComponent(dropoff)}`;
    const status  = document.getElementById('sms-status');
    if (!phone) {
      status.style.color = 'var(--danger)';
      status.textContent = '⚠️ Enter a customer phone number first.';
      return;
    }
    const msg = `NEW JOB — Lehigh Towing Service\nType: ${jobType}\nCustomer: ${name} (${phone})\nPickup: ${pickup}\nDrop-off: ${dropoff}\nDistance: ${miles} miles | ETA: ~${eta} min\nQuote: $${parseFloat(quote).toFixed(2)}\nNav: ${navLink}`;
    window.open(`sms:${phone.replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`, '_blank');
    status.style.color = 'var(--green)';
    status.textContent = '✅ SMS app opened — tap Send.';
    setTimeout(() => status.textContent = '', 5000);
    setOperatorBusy();
  }

  /* JOB LOG */
  let jobs = [];

  const STATUS_CYCLE = ['Waiting', 'Assigned', 'En Route', 'Complete'];

  function logJob() {
    const name   = document.getElementById('cust-name').value.trim();
    const pickup = document.getElementById('pickup').value.trim();
    if (!name && !pickup) { alert('Enter at least a customer name or pickup address.'); return; }
    jobs.unshift({
      id:      jobs.length + 1,
      name,
      phone:   document.getElementById('cust-phone').value.trim(),
      vehicle: document.getElementById('cust-vehicle').value.trim(),
      pickup,
      dropoff: document.getElementById('dropoff').value.trim(),
      quote:   document.getElementById('quote-total').value,
      notes:   document.getElementById('job-notes').value.trim(),
      base:    document.getElementById('rate-base').value,
      mile:    document.getElementById('rate-mile').value,
      hook:    document.getElementById('rate-hook').value,
      extra:   document.getElementById('rate-extra').value,
      jobType: document.getElementById('job-type').value,
      status:  'Waiting',
      eta:     etaMinutes,
      miles:   distanceMiles,
      time:    new Date()
    });
    renderJobs();
    resetForm();
  }

  function advanceStatus(idx) {
    const j = jobs[idx];
    const cur = STATUS_CYCLE.indexOf(j.status);
    if (cur < STATUS_CYCLE.length - 1) {
      j.status = STATUS_CYCLE[cur + 1];
      if (j.status === 'Complete') setOperatorAvailable();
    }
    renderJobs();
  }

  function editJob(idx) {
    const j = jobs[idx];
    document.getElementById('cust-name').value    = j.name;
    document.getElementById('cust-phone').value   = j.phone;
    document.getElementById('cust-vehicle').value = j.vehicle;
    document.getElementById('pickup').value        = j.pickup;
    document.getElementById('dropoff').value       = j.dropoff;
    document.getElementById('job-notes').value     = j.notes;
    document.getElementById('rate-base').value     = j.base;
    document.getElementById('rate-mile').value     = j.mile;
    document.getElementById('rate-hook').value     = j.hook;
    document.getElementById('rate-extra').value    = j.extra;
    document.getElementById('quote-total').value   = j.quote;
    document.getElementById('job-type').value      = j.jobType || 'Tow';
    distanceMiles = j.miles || 0;
    etaMinutes    = j.eta   || 0;
    // remove from log (will be re-logged on save)
    jobs.splice(idx, 1);
    renderJobs();
    window.scrollTo(0, 0);
  }

  function statusClass(s) {
    return { 'Waiting': 'status-waiting', 'Assigned': 'status-assigned', 'En Route': 'status-enroute', 'Complete': 'status-complete' }[s] || '';
  }

  function renderJobs() {
    const count = jobs.length;
    document.getElementById('job-count').textContent = count + (count === 1 ? ' job' : ' jobs');
    const inner = document.getElementById('job-strip-inner');
    if (!count) {
      inner.innerHTML = '<div class="strip-empty">No jobs logged yet — dispatched jobs will appear here.</div>';
      updateArrows();
      return;
    }
    inner.innerHTML = jobs.map((j, i) => {
      const isDone = j.status === 'Complete';
      const nextLabel = STATUS_CYCLE[STATUS_CYCLE.indexOf(j.status) + 1] || '';
      return `
      <div class="job-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:4px;">
          <div class="job-card-num">Job #${j.id} · ${j.time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
          <span class="status-badge ${statusClass(j.status)}">${j.status}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:1px;">
          <span class="job-type-tag">${j.jobType || 'Tow'}</span>
        </div>
        <div class="job-card-name">${j.name || 'Unknown Customer'}</div>
        <div class="job-card-phone">${j.phone || '—'}</div>
        <div class="job-card-addr">
          <strong>PICKUP:</strong> ${j.pickup || '—'}<br>
          <strong>DROP-OFF:</strong> ${j.dropoff || '—'}
        </div>
        ${j.eta ? `<div class="job-card-eta">📍 ${j.miles > 0 ? j.miles.toFixed(1)+' mi · ' : ''}ETA ~${j.eta} min</div>` : ''}
        ${j.vehicle ? `<div class="job-card-vehicle">${j.vehicle}</div>` : ''}
        ${j.notes   ? `<div class="job-card-vehicle">${j.notes}</div>`   : ''}
        <div class="job-card-quote">$${parseFloat(j.quote).toFixed(2)}</div>
        <div class="job-card-footer">
          <button class="btn-advance" onclick="advanceStatus(${i})" ${isDone ? 'disabled' : ''}>${isDone ? '✅ Done' : '→ ' + nextLabel}</button>
          <button class="btn-edit" onclick="editJob(${i})">✏️ Edit</button>
        </div>
      </div>`;
    }).join('');
    updateArrows();
  }

  function resetForm() {
    ['cust-name','cust-phone','cust-vehicle','job-notes'].forEach(id =>
      document.getElementById(id).value = '');
    ['rate-hook','rate-extra'].forEach(id => document.getElementById(id).value = 0);
    document.getElementById('job-type').value = 'Tow';
    clearRoute();
    document.getElementById('sms-status').textContent = '';
  }
</script>
